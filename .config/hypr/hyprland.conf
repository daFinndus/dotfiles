# Monitors
monitor = eDP-1, 1920x1200@60, 0x1200, 1

# Fallback monitor rule
monitor = , 1920x1080@60, 0x0, 1

# Colors fallback (if pywal missing)
$background = rgba(160f1fff)
$foreground = rgba(e7e7e5ff)
$color3 = rgba(dc8fa1ff)
$color4 = rgba(a494ebff)
$color5 = rgba(dd91d0ff)
$color14 = rgba(b5dfdaff)

source = colors.conf

# Programs
# Set commonly used apps
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun 
$browser = firefox

$eww = eww daemon
$flameshot = flameshot gui

$wallpaper = bash /home/finn/.config/hypr/scripts/wallpaper.sh

# Autostart
exec-once = hyprpaper
exec-once = $eww
exec-once = mako
exec-once = wallpaper

# Environment Variables
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibatas
env = HYPRCURSOR_SIZE,24


# Permissions
# Permission changes require a Hyprland restart


# Look And Feel
# General settings
general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    # Use pywal variables when available
    col.active_border = $color4 $color14 45deg
    # Dimmed variant for inactive windows
    col.inactive_border = $color2 $color3 45deg

    # Enable resizing by border drag
    resize_on_border = false

    # See tearing docs before enabling
    allow_tearing = false

    layout = dwindle
}

    # Decoration
    decoration {
    rounding = 4
    rounding_power = 2

    # Window opacity
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # Blur settings
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# Animations
animations {
    enabled = yes, please :)

    # Default curves
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Workspace rules (examples)
# Smart gaps / no gaps when only
# Uncomment to enable per-workspace gap rules

# Float alacritty when running alsamixer
windowrulev2 = float, title:^(alsamixer)$, class:^($terminal)$
windowrulev2 = center, title:^(alsamixer)$, class:^($terminal)$

# Float iwctl windows too
windowrulev2 = float, title:^(iwctl)$, class:^($terminal)$
windowrulev2 = center, title:^(iwctl)$, class:^($terminal)$

# And the bluetoothctl windows too
windowrulev2 = float, title:^(bluetoothctl)$, class:^($terminal)$
windowrulev2 = center, title:^(bluetoothctl)$, class:^($terminal)$

# Layout: Dwindle
dwindle {
    pseudotile = true # Master switch for pseudotiling
    preserve_split = true # Keep split when resizing
}

# Master layout settings
master {
    new_status = master
}

# Misc
misc {
    force_default_wallpaper = 0 # Disable anime mascot wallpapers
    disable_hyprland_logo = true # Disable random hyprland logo background
}


# Input
# Keyboard and touchpad settings
input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See device config docs
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


# Keybindings
$mainMod = SUPER # Sets "Windows" key as main modifier

# Binds docs
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, B, exec, $browser
bind = $mainMod, M, exit,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, S, exec, $flameshot
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, T, exec, hyprctl dispatch swapactiveworkspaces eDP-1 DP-1

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Execute hyprlock on laptop close
bind = , switch:on:Lid Switch, exec, hyprlock 

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Windows and workspace rules
# Ignore maximize requests from apps
windowrule = suppressevent maximize, class:.*

# Fix some XWayland dragging issues
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
